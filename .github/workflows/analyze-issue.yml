name: Analyze Issue

on:
  workflow_call:
    inputs:
      issue_number:
        description: The issue number to analyze.
        required: true
        type: string

jobs:
  analyze-issue:
    if: contains(github.event.comment.body, 'claude issue analyze')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6

      - name: Analyze issue with Claude Code
        uses: anthropics/claude-code-action@e58dfa55559035499a4982426bb73605e8b5ad8e # v1.0.105
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: --allowedTools "Bash,Read,Grep,Glob"
          prompt: |
            Analyze GitHub issue #${{ inputs.issue_number }} in repository `${{ github.repository }}`
            against this codebase to identify questions that need answering
            before an AI agent can implement it. Then post the result as a
            comment on the issue.

            The current working directory is a checkout of `${{ github.repository }}`.
            The `gh` CLI is authenticated via the `GH_TOKEN` environment variable.

            ## Step 1: Fetch the issue

            Fetch the issue and its existing comments so you have full context
            and avoid repeating questions that have already been answered:

            ```
            gh issue view ${{ inputs.issue_number }} \
              --repo ${{ github.repository }} \
              --json title,body,number,state,labels,assignees,milestone,url,comments
            ```

            ## Step 2: Analyze the codebase

            Thoroughly explore the codebase to understand how the requested
            change would fit in. Consider:

            - **Architecture**: Which parts of the codebase are relevant? What patterns and conventions are used?
            - **Scope**: What files, modules, or components would need to change?
            - **Dependencies**: Are there dependencies or constraints that affect the approach?
            - **Edge cases**: What edge cases or failure modes should be considered?
            - **Testing**: What testing strategy would be appropriate?
            - **Ambiguity**: What is unclear, underspecified, or could be interpreted multiple ways in the issue description?

            ## Step 3: Formulate questions

            Based on the analysis, compile a list of specific, actionable
            questions that need to be answered before implementation can start.
            Focus on:

            - Ambiguities in the requirements
            - Design decisions that aren't specified
            - Behavioral edge cases that aren't addressed
            - Acceptance criteria that are missing or unclear
            - Anything where the codebase suggests multiple valid approaches

            Do NOT include questions that can be answered by reading the
            codebase. Only ask about things that require human input or product
            decisions.

            ## Step 4: Decide readiness and post (or update) the comment

            Decide whether the issue is ready for an AI agent to implement:

            - **Ready**: The requirements are clear and no questions remain.
                The comment should state that the issue is ready for an AI agent
                to implement, with a brief summary of the understood scope and
                affected areas.

            - **Not ready**: One or more questions remain. The comment should
                contain the questions as a numbered list under a heading.

            Format the comment clearly. The very first line of the comment body
            MUST be the exact HTML marker below, on its own line. The marker is
            how subsequent runs find and replace this comment, so do not change
            it or surround it with anything:

            ```
            <!-- claude-issue-analysis -->
            ```

            Immediately after the marker, include a short note that the comment
            was generated by an AI analysis of the codebase, then the body
            (readiness summary or numbered questions).

            Before posting, check whether a previous analysis comment already
            exists on this issue and replace it instead of adding a new one:

            1. List existing comments and find the first one whose body starts
               with the marker `<!-- claude-issue-analysis -->`:

               ```
               gh api -H "Accept: application/vnd.github+json" \
                 "/repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
                 --paginate \
                 --jq '[.[] | select(.body | startswith("<!-- claude-issue-analysis -->"))][0].id // empty'
               ```

            2. If a comment id is returned, fully replace that comment's body
               (do not append, do not merge — overwrite completely):

               ```
               gh api --method PATCH -H "Accept: application/vnd.github+json" \
                 "/repos/${{ github.repository }}/issues/comments/COMMENT_ID" \
                 -f body="NEW_COMMENT_BODY"
               ```

            3. If no existing analysis comment is found, post a new one:

               ```
               gh issue comment ${{ inputs.issue_number }} --repo ${{ github.repository }} --body "COMMENT_BODY"
               ```

            Do NOT make any file changes in the target repository or push any
            commits. This workflow only reads the codebase and posts or updates
            a single comment on the issue.
